<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
<h1>Deposit Page</h1>
<hr>

<input type="text" name="balance" id="balance" placeholder="입금할 금액">
<button onclick="deposit()">입금</button>


<script>

	function deposit(){
		const balance = document.getElementById("balance").value;
		const token = localStorage.getItem("accessToken");
		
		fetch("/api/banking/deposit", {
			method : "post",
			headers : {
				"Content-Type": "application/x-www-form-urlencoded",
				"Authorization": "Bearer " + token
			},
			body : "balance=" + balance
		})
		.then(res => res.text())
		.then(data => {
			if(data != ""){
				console.log(data)
				alert(balance + "원 입금 완료")
				location.href="/";
			}else{
				alert("토큰 오류 !!")
			}
		});
	}

</script>

	
</body>
</html>
